body:
  text: 洞真太上八素真經三五行化妙訣通三太極四真人𧫎太上大道君曰服日月之精奔二景之妙妙極之寶寶之最髙降生神丹三合成德謹已聞命道足止此乎太上答曰善哉要問利益一切矣凡學得道皆由積善其間方術內外輔成吐納餐服皆方術也三智五慧皆善行也善行不立方術無驗驗亦不久久必滅身上士髙才先立善行然後方術方術巨多多亦無數精粗有階雖各因緣緣粗至妙妙極三合在此日月神丹欲速得效務行萬善萬善不可頓行行之亦不知其要要在三五三五得之萬善自立其數雖不倅足其間可得修方方術與善動靜兼行行之積久不過九年必獲神通登聖真矣真人稽首重請問曰三五之要可得聞乎太上答曰可得聞耳非人勿傳三者智也五者慧也三智者知天知地知人也知人法地安靜為本知地法天和順為基知天法道動不纍寂寂常湛存動應利物利益一切不名不矜不勞不慮不厭不辭此知明了了然無疑與日合德故號三智智者知也知此三才才堪行道道者通也仁義禮知信五者同不壅不壅則通通濟無極物我相生生生最急急行不怠决解無疑利益無窮故號五慧五慧合三智三智通五慧慧智無極智慧無崖忘滯得通長生無死由於三五萬善相成各有經戒科法威儀天文地章人理分明父以教子君以勑臣師訓弟子卑亦獻尊無心故忘言有心則相益益彼不以為功功忘名為上德德得上道常得無失學者之極極此宗源也真人又請問曰無上妙㫖方願宣行上以化下下以敬上師資之宜經卷互有或前或後或在中篇或别科儀𢦙傳口訣世代不同家殊國異繁省既並施用多疑不敢意斷回遑移辰白日易去寸隂難留修行乖體增罪加尤救之無方俯仰慙懼歸命天尊天尊曲愍的然要㫖特乞戒言太上答曰學必須師師口為定諸文修忘多少參差盡意豈得具言乎方演化利益羣生羣生有心急宜獎就輒說要訣善自詳量以時消息勿背宗源耳真人歡喜稽首奉命太上曰所以貴人與天地等者謂其能相教導也先學悟後覺反流歸一源捨苦即樂可貴可尊故得道仙真未極大聖者後皆發心立𩓑緣運垂感更生人中贊揚妙法積德纍功乃登大聖大聖之資資於行教教訓嚴明治邪以正慈悲喜捨四等宣通不能爾者雖日夜誦經佩服符氣勞多獲少欲成大乘大乘以溥濟為先溥濟以開化為急急教衆生守一存三行五無𢢣必究大乘其中小識不堪大方方其小者依任與之行藏在師師明無謬精加內省勿妄唱為為巳為物後身身先自非深智洞慧之人不可與之言斯道矣行化之時先誠所習所習有驗雖未究竟粗可救急急便行之待僃則功不進求僃則無期矣求僃有期在乎並行並行並習並習並驗驗不即者久久自徴自徴數滿滿則得道得道極修不可即登雖不可即登當稍稍行習習之以時行之㑹運運之未㑹不可強時易失可𧇊𧇊時強運勞而致弊得時逢運逸而保全全德之人不失時運時運不是上下相疑內外精忌隂陽相傷此不可冒犯犯之考深幽顯得罪不可解除欲免斯禍諦識運時四序五行相續不絶依時修習無暫懈退感至運開各有其法三洞諸經法法不同運興則用運衰則捨不得輕慢敬與用平運有行藏道無輕重也化身化家化鄉化國化天下天下不相許與勿犯之國鄉家身皆同一法身習不宜亦莫若强苦强致敝退敗成災墜陷地獄永隔天堂人身尚不可得何冀乎仙真真人之學自試為先先習某所受事可則進不可則止止不為惡更思因緣因緣未深徐密又進進可則前不可又巳巳重首過慙愧屏營不得對退與他言之默復潜習一事三為三為不可可更易方方法無數隨受施行行化化身然後及物自一身及天下至于無央天下皆同密行此術此術練心心練質易質易心精成真有期矣凡行妙化當先化身化身者先志道道在心中心中存道道不可見心不可忘不忘心者存道堅正正道在心心事不懷邪不敢干名之為志志道至堅成於事也何由自堅堅由大慈慈愛一切不異已身身不損物物不損身一切含氣木草壤灰皆如巳身念之如子不生輕慢意不起傷彼心心𢘆念之與巳同存有識願其進道無識願其識生此應天德萬善之先久行朗逹與日月並明也凡行妙化先當化身化身者先志道志道已次守德德在識中識中有神神識䔍道守德成真真人所習習善不忘憶之無遺名之為識識善行慈生生為始次用儉慎慎終如始無敗無雜號曰真人謹密不忘動身𨼆靜為事出則應時時去即淪不滯乎物聲色不能汚勞辱不能纍處富貴時不積不傲不驕不奢不華不耀在貧賤日不諂不佞不矯不偷不嗊不嗃居中有常厚薄取衷潛光布實持莭用敬節有尊貴之報實光招洞真之果修儉不休與日月合德也凡行妙化先當化身化身者先志道次守德終謙卑卑者知也移也底也識神有知道知德道尊德貴不可妄求求之以謙卑以自牧位勢在前退身在後次苐在後無覬於前恆居衆下底極之鄉人所不競俗所不營止而不悶思道益堅守德彌固羣生所伏凡所不能巳獨能之超羣出衆神明所矜正真所祐移下升髙自地登天捨凡入聖遂成大智慧之源一切所宗天人所仰由平退身度人致能居後反前謙讓更得不靜最雄不敢為先自之先逹人中之尊天地齊一白日登晨星辰之極三智之實實在慈儉不敢為先智之妙也凡行妙化先當化身化身者習三智三智巳遵五慧五慧者仁禮信義智也三智洞者包乎五慧五慧中智即是三智學習未究三智未相包修行未通五慧未相一故立名有殊三五成異然則五慧中智智未極也極則在三同一一同無復五矣仁禮信義亦有智分智分在四四故得成四無此智不能立也四有少分故不受智名智分居多故與四德為五五德相通平等無偏無偏則無復五名名無則與三智為一三智初一一就五焉號為六通洞逹之後又無三焉三五既䐇謂之七覺覺悟了然究竟無極有數無數朗徹無礙分之則分合之則合合不纍分分不纍合合則總稱曰一分則略名為七七階示漸引末歸源識神生知是其一也知而能見是其二也見而能從是其三也從而能習是其四也習而能堅是其五也堅而能成是其六也成而不居是其七也七覺七階由乎一覺覺有淺深次苐為七過此以往洞入道源八逹無窮非言所說說不能窮默識自了默識自了其言自忘忘言得道道之上也凡行妙化先當化身化身者遵五慧仁者好生惡殺救敗護成禁忌殺傷隔絶嫉妬能和合隂陽放生度死慈悲慊欵念念弗忘積仁長夀遂登神仙神仙所貴貴乎相生生長不絶隱顯相傳傳行有氣氣質有名名仁者主木木生火火為禮禮者恭敬內外揖拜有儀崇仰三尊貴養重和禁忌驕慢斷絶貪媱能清貞廉潔久則神仙火生土土為信信者中實不妄誓無負違禁忌虛詐欺內者誅能心口相應孚諒有徴篤厚誠實久則神仙土生金金為義義則明斷是非賞善罰惡去邪就正决嫌定疑捨財不盜抑猛佑羸禁忌迷惑邪見狐疑強梁自用竊奪公私能奬福遏禍治亂止暴清素博贍久則神仙金生水水為智智者一切知了分别真僞禁忌姦邪愚癡執滯能清平洞徹勤學教人善誘無倦久則神仙五德偏多有功有罪有進有退更相補贖多善受福多惡受禍禍福無門唯人所召所召未專善惡回換雖福至天堂尚有退落禍入地獄亦有超升皆非學道之儔正是流俗之侣粗知信向不能得真真仙之道付上士志人志人上志皆好學真仙勤習三智精修五慧三智平等俱行不偏不著積久周通克登上聖與道合真更相傳授必得其人學不知三五徒自勞苦耳知者祕之密行勿泄也凡行妙化先當化身化身者先受法受法不齊率爾傳付或齊戒不精信物不僃或協勢强求不遵師法或因緣遇得不尋明師或玄盟不洗信物不輸初欲修行俄便廢棄或更狐疑訾毀敞露形言醜惡穢辱萬端或祕之不解無意研尋供養違科施置非所䡖慢靈文苟存我有或奪或乞竊覽妄行犯此諸罪風刀無原急宜解謝洗心浣腸歸命青童禮拜首愆三年不替罪必被原後不重犯乃得行經若相命未合由功德未充唯存青童開通心識解咎殃之結降洞朗之明使究了玄義自照因緣修行速驗克成上真也存青童君法東海之中方諸之山本名東壟東華之宫周回三千里有六門東門名青華門門郎姓立名伯淵主學仙簿録所經南門名神華玉門門郎姓王名祖思主真人飛仙出入西門名玉洞門門郎姓康名尚節主髙上衆真玉皇三十九帝二十四玉真西龜王母出入北門名玉隂門門郎姓史名少業主真仙及始學者紀糾退降所經東南門名天關門門郎姓文名五車主人宿命因緣簿録得仙所由東北門名寒水門門郎姓重名林都主鬼爽轉敘所經右六門治天東壟山門有師子巨狩各三百衛門門將各三千學道之人先知門名次苐有知者則不死名奏青宫入室燒香𢘆存門名及門郎姓字九年得乘雲升入六門也六門內有三宫第一宫名方諸青宫上相青童所治第二宫名玉保青宫上相大司馬髙晨師所治第三宫名玉華青宫東海青華小童所治右三宫內宫並有玉樹數百株上有鵾雞鳳凰九色之鳥下有芝草玉井自生之泉飲之夀同三光師子天獸輔衛墻外凡學道未成皆由罪障當清齊燒香謝罪請福以一卯日時出於露地雨則住堂注心東向叩齒三通閉目存見三宫念上相青童君在方諸青宫之內金殿瓊房之裏衆真侍女三千人直衛左右玄輝自映神灼自明青霞廕其上紫霄繞其間宫北殿上有玉格格上有學仙簿録玄名年月金簡玉札有十萬篇領仙郎典之想我名存中諦存良久然後見青童君姿貌光彩煥爛煒燁堅心斂手稱位姓名今至心歸命上相青童君仍禮三拜拜畢仍伏密叩搏各三密言乞赦小生某先後深愆重罪開心悟意使解了玄經自識宿命速成神仙家門興𨺚道德流布畢又禮三拜三叩搏止亦可向北六十日一行禮至於存思𢘆在心也若不能得丁卯日餘卯皆可用又不能六十日一行亦可四時為之為之疏者罪積難積不精不攺徒勞增尤必能至到年一行之疏而慊實勝於數而浮虛自非六十日一修皆一禮三百六十拜至三千六百拜止若體不甚疲可一日一夜十二時行之一時禮三百拜合三千六百也禮後思過攺之勿復重犯存善行之不得暫休如此三年三尊降現矣洞真太上八素真經三五行化妙訣
